<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brandier AI Studio — Anas Mehboob</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<!-- Formspree handles email delivery -->
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F8F7F4;
  --white:#FFFFFF;
  --black:#080808;
  --muted:#7A7A72;
  --soft:#EFEDE8;
  --border:rgba(10,10,10,0.07);
  --border2:rgba(10,10,10,0.14);
  --c1:#00C4D4;--c2:#8B3FF5;--c3:#F0308A;--c4:#00C47A;--c5:#FF6530;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Syne',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--black);font-family:var(--sans);font-weight:400;font-size:16px;line-height:1.6;overflow-x:hidden}

/* ════════════════════════════
   CUSTOM CURSOR — magnetic dot
════════════════════════════ */
body{cursor:none}
.cur-dot{
  position:fixed;top:0;left:0;z-index:9999;pointer-events:none;
  width:8px;height:8px;border-radius:50%;
  background:linear-gradient(135deg,var(--c1),var(--c2));
  transform:translate(-50%,-50%);
  transition:width .2s,height .2s,background .2s;
}
.cur-ring{
  position:fixed;top:0;left:0;z-index:9998;pointer-events:none;
  width:40px;height:40px;border-radius:50%;
  border:1.5px solid rgba(139,63,245,0.35);
  transform:translate(-50%,-50%);
}
.cur-dot.hov{width:12px;height:12px;background:linear-gradient(135deg,var(--c3),var(--c2))}
.cur-ring.hov{width:60px;height:60px;border-color:rgba(139,63,245,0.6);background:rgba(139,63,245,0.04)}
@media(pointer:coarse){body{cursor:auto}.cur-dot,.cur-ring{display:none}}

/* ════════════════════════════
   AURORA BG
════════════════════════════ */
#aur{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.6}

/* ════════════════════════════
   NAV
════════════════════════════ */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:18px 64px;transition:all .5s}
nav.sc{background:rgba(248,247,244,0.94);backdrop-filter:blur(28px);border-bottom:1px solid var(--border);padding:12px 64px}
.logo-a{display:flex;align-items:center;gap:13px;text-decoration:none}
.logo-img{width:54px;height:54px;object-fit:contain;flex-shrink:0;transition:transform .4s}
.logo-a:hover .logo-img{transform:rotate(15deg) scale(1.05)}
.logo-wm{display:flex;flex-direction:column;gap:3px;line-height:1}
.logo-brand{font-family:var(--serif);font-size:24px;font-weight:600;letter-spacing:.04em;color:var(--black)}
.logo-sub{font-size:8.5px;font-weight:700;letter-spacing:.3em;text-transform:uppercase;background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200%;animation:gs 4s ease-in-out infinite}
.nav-ul{display:flex;gap:36px;list-style:none}
.nav-ul a{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-decoration:none;position:relative;transition:color .3s}
.nav-ul a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:linear-gradient(90deg,var(--c1),var(--c2));transition:width .35s}
.nav-ul a:hover{color:var(--black)}.nav-ul a:hover::after{width:100%}
.nav-btn{padding:10px 28px;background:var(--black);color:var(--white);font-size:12px;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;transition:all .3s;font-family:var(--sans);clip-path:polygon(8px 0%,100% 0%,100% 100%,0% 100%,0% 8px)}
.nav-btn:hover{background:linear-gradient(135deg,var(--c2),var(--c3));transform:translateY(-1px)}
.nav-ham{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none}
.nav-ham span{width:22px;height:1.5px;background:var(--black);display:block;transition:all .3s}

/* ════════════════════════════
   MOBILE MENU
════════════════════════════ */
.mob-menu{display:none;position:fixed;inset:0;background:rgba(248,247,244,.98);backdrop-filter:blur(20px);z-index:190;flex-direction:column;align-items:center;justify-content:center;gap:32px}
.mob-menu.open{display:flex}
.mob-menu a{font-family:var(--serif);font-size:34px;font-weight:300;color:var(--black);text-decoration:none}
.mob-menu a.cta{font-family:var(--sans);font-size:13px;letter-spacing:.16em;text-transform:uppercase;border:1px solid var(--black);padding:14px 44px}
.mob-close{position:absolute;top:24px;right:24px;background:none;border:none;font-size:26px;cursor:pointer;color:var(--black)}

/* ════════════════════════════
   HERO
════════════════════════════ */
#hero{
  min-height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  padding:140px 64px 80px;
  position:relative;z-index:10;overflow:hidden;
  gap:60px;
}
#hero::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:80px 80px;
  pointer-events:none;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent);
}
.hero-left{position:relative;z-index:2}
.h-badge{display:inline-flex;align-items:center;gap:10px;padding:7px 18px;border:1px solid var(--border2);border-radius:40px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:28px;opacity:0;animation:fu 1s ease .1s forwards;width:fit-content}
.h-dot{width:7px;height:7px;border-radius:50%;background:var(--c4);animation:pulse 2s ease-in-out infinite;flex-shrink:0}
h1.h-ttl{font-family:var(--serif);font-size:clamp(44px,5.5vw,86px);font-weight:300;line-height:1.04;letter-spacing:-.02em;opacity:0;animation:fu 1s ease .25s forwards;color:var(--black)}
.irid{font-style:italic;background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:300%;animation:gs 6s ease-in-out infinite}
.h-sub{margin-top:24px;font-size:clamp(14px,1.6vw,16px);color:var(--muted);max-width:420px;line-height:1.85;opacity:0;animation:fu 1s ease .4s forwards}
.h-acts{margin-top:40px;display:flex;gap:14px;flex-wrap:wrap;opacity:0;animation:fu 1s ease .55s forwards}
.btn-fill{padding:14px 40px;background:var(--black);color:var(--white);font-size:12px;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;transition:all .3s;clip-path:polygon(8px 0%,100% 0%,100% 100%,0% 100%,0% 8px)}
.btn-fill:hover{background:linear-gradient(135deg,var(--c2),var(--c3));transform:translateY(-2px);box-shadow:0 8px 24px rgba(139,63,245,.25)}
.btn-line{padding:14px 40px;border:1px solid var(--border2);color:var(--muted);font-size:12px;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;transition:all .3s;background:rgba(255,255,255,.7)}
.btn-line:hover{border-color:var(--black);color:var(--black)}

/* ════════════════════════════
   WATCH ON TV BUTTON — Liquid Glass
════════════════════════════ */
.btn-glass-tv{
  position:relative;
  padding:14px 32px;
  background:rgba(139,63,245,0.12);
  backdrop-filter:blur(18px) saturate(180%);
  -webkit-backdrop-filter:blur(18px) saturate(180%);
  border:1px solid rgba(139,63,245,0.35);
  color:var(--white);
  font-size:12px;
  letter-spacing:.14em;
  text-transform:uppercase;
  text-decoration:none;
  transition:all .4s cubic-bezier(0.23, 1, 0.32, 1);
  clip-path:polygon(8px 0%,100% 0%,100% 100%,0% 100%,0% 8px);
  display:inline-flex;
  align-items:center;
  gap:8px;
  overflow:hidden;
  box-shadow:
    0 4px 24px rgba(139,63,245,0.15),
    inset 0 1px 0 rgba(255,255,255,0.2),
    inset 0 -1px 0 rgba(0,196,212,0.1);
}
.btn-glass-tv::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(0,196,212,0.25),rgba(139,63,245,0.3),rgba(240,48,138,0.2));
  opacity:0;
  transition:opacity .4s;
  z-index:0;
}
.btn-glass-tv::after{
  content:'';
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(255,255,0.15) 0%,transparent 60%);
  transform:translate(-100%,-100%);
  transition:transform .6s ease;
  z-index:0;
}
.btn-glass-tv span{
  position:relative;
  z-index:1;
}
.btn-glass-tv .tv-icon{
  font-size:14px;
  filter:drop-shadow(0 0 8px rgba(139,63,245,0.6));
  animation:tvPulse 2.5s ease-in-out infinite;
}
.btn-glass-tv:hover{
  transform:translateY(-2px);
  border-color:rgba(139,63,245,0.6);
  box-shadow:
    0 8px 32px rgba(139,63,245,0.3),
    0 0 40px rgba(0,196,212,0.2),
    inset 0 1px 0 rgba(255,255,255,0.3);
}
.btn-glass-tv:hover::before{
  opacity:1;
}
.btn-glass-tv:hover::after{
  transform:translate(0,0);
}
@keyframes tvPulse{
 0%,100%{opacity:1;transform:scale(1)}
 50%{opacity:.7;transform:scale(1.1)}
}

.hero-right{position:relative;height:520px;display:flex;align-items:center;justify-content:center;opacity:0;animation:fu 1.2s ease .6s forwards}
.h-orb-wrap{position:relative;width:380px;height:380px}
.h-orb{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(0,196,212,.18),rgba(139,63,245,.14),rgba(240,48,138,.10),transparent 70%);
  border:1px solid rgba(139,63,245,.15);
  animation:orbFloat 6s ease-in-out infinite;
  box-shadow:0 80px rgba(139,63,245,.12),inset 0 0 60px rgba(0,196,212,.06);
}
.f-card{
  position:absolute;
  background:rgba(255,255,.85);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,.9);
  box-shadow:0 8px 32px rgba(0,0,.08),0 2px 8px rgba(0,0,.04);
  border-radius:16px;
  padding:14px 18px;
  display:flex;align-items:center;gap:10px;
  white-space:nowrap;
  transform-style:preserve-3d;
}
.f-card-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.f-card-text{display:flex;flex-direction:column;gap:2px}
.f-card-title{font-size:12px;font-weight:600;color:var(--black);letter-spacing:.02em}
.f-card-sub{font-size:10px;color:var(--muted)}
.fc1{top:-10px;left:-30px;animation:fc1f 5s ease-in-out infinite}
.fc2{top:60px;right:-50px;animation:fc2f 6s ease-in-out infinite .8s}
.fc3{bottom:40px;left:-40px;animation:fc3f 7s ease-in-out infinite .4s}
.fc4{bottom:-20px;right:-20px;animation:fc4f 5.5s ease-in-out infinite 1.2s}
.spark{position:absolute;border-radius:50%;background:linear-gradient(135deg,var(--c1),var(--c2))}
.sp1{width:8px;height:8px;top:20%;right:20%;animation:sparkle 3s ease-in-out infinite}
.sp2{width:5px;height:5px;bottom:25%;left:15%;animation:sparkle 4s ease-in-out infinite .7s}
.sp3{width:6px;height:6px;top:60%;right:8%;animation:sparkle 3.5s ease-in-out infinite 1.3s}
.sp4{width:4px;height:4px;top:10%;left:30%;animation:sparkle 2.8s ease-in-out infinite .5s;background:linear-gradient(135deg,var(--c3),var(--c5))}
.h-scr{position:absolute;bottom:32px;left:64px;display:flex;align-items:center;gap:12px;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);opacity:0;animation:fu 1s ease 1.2s forwards;z-index:2}
.sbar{width:30px;height:1px;background:var(--border2);overflow:hidden;position:relative}
.sbar::after{content:'';position:absolute;left:-100%;top:0;width:100%;height:100%;background:linear-gradient(90deg,var(--c1),var(--c2));animation:sw 2.2s ease-in-out infinite}

/* ════════════════════════════
   STATS
════════════════════════════ */
.stats{position:relative;z-index:10;display:grid;grid-template-columns:repeat(4,1fr);background:var(--white);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.stat{padding:28px 20px;text-align:center;border-right:1px solid var(--border);position:relative;overflow:hidden;transition:background .3s}
.stat::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:linear-gradient(90deg,var(--c1),var(--c2));transition:width .4s}
.stat:hover{background:var(--soft)}.stat:hover::before{width:80%}
.stat:last-child{border-right:none}
.stat-n{font-family:var(--serif);font-size:clamp(30px,3.5vw,44px);font-weight:300;background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.stat-l{font-size:clamp(9px,1.2vw,11px);letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:6px}

/* ════════════════════════════
   MARQUEE
════════════════════════════ */
.marquee{
  overflow:hidden;white-space:nowrap;
  position:relative;z-index:10;
  background:rgba(248,247,244,0.7);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(139,63,245,0.12);
  border-bottom:1px solid rgba(139,63,245,0.12);
  padding:0;
}
.marquee::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--c1),var(--c2),var(--c3),var(--c1),transparent);
  background-size:200%;
  animation:gs 4s linear infinite;
  opacity:0.7;
}
.marquee::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--c3),var(--c2),var(--c1),var(--c3),transparent);
  background-size:200%;
  animation:gs 4s linear infinite reverse;
  opacity:0.4;
}
.mq-inner{display:inline-flex;animation:mq 30s linear infinite;padding:14px 0}
.mq-item{
  font-family:var(--serif);font-size:clamp(14px,1.6vw,17px);
  font-weight:300;font-style:italic;
  padding:0 28px;
  border-right:1px solid rgba(139,63,245,0.1);
  color:var(--muted);
  letter-spacing:0.02em;
}
.mq-item.hi{
  background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;font-weight:500;
  filter:brightness(0.85);
}

/* ════════════════════════════
   SECTION COMMON
════════════════════════════ */
section{padding:100px 64px;position:relative;z-index:10}
.s-lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:14px}
.s-lbl::before{content:'';width:24px;height:1px;background:linear-gradient(90deg,var(--c1),transparent)}
h2.s-ttl{font-family:var(--serif);font-size:clamp(32px,4vw,62px);font-weight:300;line-height:1.07;margin-bottom:16px;color:var(--black)}
h2.s-ttl em{font-style:italic;background:linear-gradient(135deg,var(--c2),var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.s-desc{font-size:clamp(14px,1.6vw,16px);color:var(--muted);max-width:440px;line-height:1.85}

/* ════════════════════════════
   AD TYPES
════════════════════════════ */
#adtypes{border-top:1px solid var(--border);background:var(--bg)}
.adtype-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin-top:56px;background:var(--border)}
.ad-card{background:var(--white);padding:36px 28px;position:relative;overflow:hidden;transition:all .4s;cursor:default}
.ad-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3));transform:scaleX(0);transform-origin:left;transition:transform .4s}
.ad-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,196,212,.03),rgba(139,63,245,.03));opacity:0;transition:opacity .4s}
.ad-card:hover{transform:translateY(-3px);box-shadow:0 12px 48px rgba(0,0,0,.07)}
.ad-card:hover::before{transform:scaleX(1)}
.ad-card:hover::after{opacity:1}
.ad-icon{width:44px;height:44px;margin-bottom:20px}
.ad-num{font-size:10px;letter-spacing:.16em;color:var(--muted);margin-bottom:10px}
.ad-name{font-family:var(--serif);font-size:clamp(17px,1.8vw,20px);font-weight:400;margin-bottom:10px;line-height:1.2;color:var(--black)}
.ad-desc{font-size:clamp(12px,1.3vw,13px);color:var(--muted);line-height:1.75}
.ad-tag{display:inline-block;margin-top:14px;padding:3px 10px;border-radius:20px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--border2);color:var(--muted)}

/* ─── DESIGNED VIDEO THUMBNAILS ─── */
.vt-thumb,.v-thumb{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;overflow:hidden}
.vt-shine{position:absolute;inset:0;background:radial-gradient(ellipse at 25% 35%,rgba(139,63,245,0.18),transparent 55%);pointer-events:none}
.vt-particles span{position:absolute;border-radius:50%;background:rgba(255,255,255,0.7);animation:sparkle 2.5s ease-in-out infinite}
.vt-icon{font-size:40px;filter:drop-shadow(0 0 16px rgba(139,63,245,0.6));z-index:1;animation:iconFloat 4s ease-in-out infinite}
.vt-label{font-family:var(--serif);font-size:20px;font-weight:300;color:rgba(255,255,255,0.92);letter-spacing:0.04em;z-index:1;text-align:center}
.vt-sub{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,0.45);z-index:1}
.vt-badge{position:absolute;top:14px;right:14px;padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;background:linear-gradient(90deg,rgba(139,63,245,0.8),rgba(240,48,138,0.8));color:var(--white);z-index:2}
@keyframes iconFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ════════════════════════════
   PORTFOLIO
════════════════════════════ */
#portfolio{border-top:1px solid var(--border);background:var(--soft)}
.p-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:44px;flex-wrap:wrap;gap:20px}
.v-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px}
.v-wrap{position:relative;aspect-ratio:16/9;background:#E5E3DE;overflow:hidden}
.v-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.v-ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:all .3s;background:rgba(0,0,0,0.35);backdrop-filter:blur(0px)}
.v-ov:hover{background:rgba(0,0,0,0.5)}
.p-ring{width:56px;height:56px;border:2px solid rgba(255,255,0.8);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .3s;background:rgba(255,0.15);backdrop-filter:blur(8px)}
.v-ov:hover .p-ring{background:rgba(255,0.95);border-color:var(--white)}
.p-ring svg{fill:var(--white);transition:fill .3s}.v-ov:hover .p-ring svg{fill:var(--black)}
.v-tag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,0.85);font-weight:500}
.v-cap{padding:10px 0 0;font-size:13px;color:var(--muted)}

/* ════════════════════════════
   ABOUT
════════════════════════════ */
#about{border-top:1px solid var(--border);background:var(--white)}
.a-wrap{display:grid;grid-template-columns:1fr 1.4fr;gap:72px;align-items:start;margin-top:60px}
.a-photo-block{position:relative}
.a-img{width:100%;display:block;object-fit:cover;object-position:center 12%;border-radius:2px;max-height:620px}
.a-frame{position:absolute;inset:0;border:1px solid var(--border);pointer-events:none;border-radius:2px}
.a-photo-badge{position:absolute;bottom:18px;left:14px;right:14px;background:rgba(255,255,255,.93);backdrop-filter:blur(16px);border:1px solid var(--border2);padding:14px 16px;display:flex;align-items:center;gap:11px;border-radius:4px}
.apb-logo{width:30px;height:30px;object-fit:contain}
.apb-info{display:flex;flex-direction:column;gap:2px}
.apb-name{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--black);line-height:1}
.apb-role{font-size:10px;letter-spacing:.14em;text-transform:uppercase;background:linear-gradient(90deg,var(--c1),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.a-eyebrow{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border:1px solid var(--border2);border-radius:40px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:20px;background:var(--soft)}
.a-p{font-size:clamp(15px,1.7vw,17px);color:rgba(10,10,10,.62);line-height:1.95;margin-bottom:20px}
.a-quote{font-family:var(--serif);font-size:clamp(19px,2.2vw,22px);font-style:italic;font-weight:300;color:var(--black);border-left:2px solid;border-image:linear-gradient(to bottom,var(--c1),var(--c2)) 1;padding-left:18px;margin:24px 0;line-height:1.45}
.a-stats{display:grid;grid-template-columns:repeat(3,1fr);margin-top:32px;border-top:1px solid var(--border);padding-top:28px}
.st{padding-right:16px;border-right:1px solid var(--border)}
.st:last-child{border-right:none;padding-left:16px;padding-right:0}
.st:nth-child(2){padding:0 16px}
.st-n{font-family:var(--serif);font-size:clamp(30px,3.5vw,38px);font-weight:300;background:linear-gradient(135deg,var(--c1),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.st-l{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:6px}

/* ════════════════════════════
   CONTACT
════════════════════════════ */
#contact{border-top:1px solid var(--border);background:var(--soft)}
.ct-wrap{display:grid;grid-template-columns:1fr 1fr;gap:72px;margin-top:60px}
.ct-h3{font-family:var(--serif);font-size:clamp(22px,2.8vw,28px);font-weight:300;line-height:1.35;margin-bottom:36px;color:var(--black)}
.ct-list{display:flex;flex-direction:column;gap:22px}
.ct-item{display:flex;flex-direction:column;gap:4px}
.ct-lb{font-size:10px;letter-spacing:.18em;text-transform:uppercase;background:linear-gradient(135deg,var(--c1),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ct-v{font-size:clamp(13px,1.6vw,15px);color:var(--black);text-decoration:none;transition:color .3s;word-break:break-all}
.ct-v:hover{color:var(--muted)}
.ct-soc{display:flex;gap:16px;flex-wrap:wrap}
.cf{display:flex;flex-direction:column;gap:22px}
.fg{display:flex;flex-direction:column;gap:6px}
.fl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.fi,.ft{background:var(--white);border:none;border-bottom:1px solid var(--border2);padding:12px 0;font-family:var(--sans);font-size:15px;font-weight:400;color:var(--black);outline:none;transition:border-color .3s;width:100%}
.fi:focus,.ft:focus{border-bottom-color:var(--c2)}
.fi::placeholder,.ft::placeholder{color:rgba(10,10,10,.18)}
.ft{resize:none;min-height:96px}
.fs{padding:14px 44px;background:var(--black);border:none;color:var(--white);font-family:var(--sans);font-size:12px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:all .3s;align-self:flex-start;clip-path:polygon(8px 0%,100% 0%,100% 100%,0% 100%,0% 8px)}
.fs:hover{background:linear-gradient(135deg,var(--c2),var(--c3));transform:translateY(-2px);box-shadow:0 8px 24px rgba(139,63,245,.25)}
.fs:disabled{opacity:.6;cursor:not-allowed}
.fm{font-size:13px;color:var(--c4);display:none;letter-spacing:.04em;padding:10px 0}
.fm.err{color:var(--c3)}

/* ════════════════════════════
   FOOTER
════════════════════════════ */
footer{border-top:1px solid var(--border);background:var(--black);padding:32px 64px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;position:relative;z-index:10}
.ft-lg{display:flex;align-items:center;gap:11px;text-decoration:none}
.ft-li{width:32px;height:32px;object-fit:contain;filter:invert(1) brightness(2)}
.ft-wm{display:flex;flex-direction:column;gap:2px;line-height:1}
.ft-brand{font-family:var(--serif);font-size:18px;font-weight:600;letter-spacing:.04em;color:var(--white)}
.ft-sub{font-size:8px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ft-cp{font-size:11px;color:rgba(255,255,255,.3)}
.ft-lk{display:flex;gap:22px;flex-wrap:wrap}
.ft-lk a{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,.32);text-decoration:none;transition:color .3s}
.ft-lk a:hover{color:var(--white)}

/* ════════════════════════════
   ANIMATIONS
════════════════════════════ */
@keyframes fu{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes sw{0%{left:-100%}50%{left:0}100%{left:100%}}
@keyframes mq{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
@keyframes gs{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1);box-shadow:0 80px rgba(139,63,245,.12)}50%{transform:translateY(-16px) scale(1.02);box-shadow:0 20px 100px rgba(139,63,245,.18)}}
@keyframes fc1f{0%,100%{transform:translate(0,0) rotateY(0deg)}50%{transform:translate(-8px,-12px) rotateY(6deg)}}
@keyframes fc2f{0%,100%{transform:translate(0,0) rotateY(0deg)}50%{transform:translate(8px,10px) rotateY(-5deg)}}
@keyframes fc3f{0%,100%{transform:translate(0,0) rotateX(0deg)}50%{transform:translate(-6px,12px) rotateX(5deg)}}
@keyframes fc4f{0%,100%{transform:translate(0,0)}50%{transform:translate(10px,-8px)}}
